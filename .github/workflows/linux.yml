name: Build on Linux
on:
  push:
    branches:
      - master
  release:
    types:
      - created

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-22.04, ubuntu-22.04-arm ]
    runs-on: ${{ matrix.os }}
    env:
      ARCH: "${{ endsWith(matrix.os, 'arm') && 'aarch64' || 'x86_64' }}"
      BIN_CHICKEN_SIGNATURE_PUBLIC_KEY: ${{ vars.MINISIGN_PUBLIC_KEY }}
    steps:
      - name: Generate build UUID
        id: build_uuid
        run: |
          BUILD_UUID=$(uuidgen)
          echo "BUILD_UUID=$BUILD_UUID" >> $GITHUB_OUTPUT
          echo "BIN_CHICKEN_UUID=$BUILD_UUID" >> $GITHUB_ENV
          echo "The UUID for this build is $BUILD_UUID"
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev desktop-file-utils
          rustup update
      - uses: Swatinem/rust-cache@v2
      - uses: r7kamura/rust-problem-matchers@v1
      - name: Build
        run: cargo build --verbose --release
      - name: Bundle
        run: cargo run --package cargo-cntp-bundle --bin cargo-cntp-bundle -- cntp-bundle
        working-directory: playground
      - name: Checkout icons into bundle
        uses: actions/checkout@v6
        with:
          repository: theCheeseboard/contemporary-icons
          path: target/bundle/${{ env.ARCH }}-unknown-linux-gnu/release/appdir/usr/share/icons/contemporary
      - name: Deploy
        run: cargo run --package cargo-cntp-deploy --bin cargo-cntp-deploy -- cntp-deploy --output-file "$HOME/Contemporary_Playground-$ARCH.AppImage"
        working-directory: playground
      - uses: actions/upload-artifact@v4
        with:
          name: contemporary-playground-linux-${{ env.ARCH }}
          path: "~/Contemporary_Playground-${{ env.ARCH }}.AppImage"
      - name: Print build UUID
        env:
          BUILD_UUID: ${{ steps.build_uuid.outputs.BUILD_UUID }}
        run: echo "$BUILD_UUID" > build_uuid.txt
      - uses: actions/upload-artifact@v4
        with:
          name: build_uuid-${{ env.ARCH }}
          path: build_uuid.txt
  bin-chicken:
    needs: build
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ ubuntu-24.04, ubuntu-24.04-arm ]
    env:
      ARCH: "${{ endsWith(matrix.os, 'arm') && 'aarch64' || 'x86_64' }}"
    steps:
      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: contemporary-playground-linux-${{ env.ARCH }}
      - name: Download build UUID
        uses: actions/download-artifact@v4
        with:
          name: build_uuid-${{ env.ARCH }}
      - name: Sign artifact
        env:
          MINISIGN_PRIV_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          printf '%s' "$MINISIGN_PRIV_KEY" > minisign.key
          minisign -S -s minisign.key -m Contemporary_Playground-${{ env.ARCH }}.AppImage
      - name: Upload to bin-chicken
        env:
          BIN_CHICKEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BIN_CHICKEN_CHANNEL: blueprint
          BIN_CHICKEN_TARGET: ${{ env.ARCH }}-unknown-linux-gnu
          BIN_CHICKEN_REPOSITORY: contemporary_playground
          UPLOAD_FILE: Contemporary_Playground-${{ env.ARCH }}.AppImage
        run: |
          BIN_CHICKEN_VERSION_HEADER=()
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            BIN_CHICKEN_CHANNEL=stable
            BIN_CHICKEN_VERSION_HEADER=(-H "X-Bin-Chicken-Version: ${TAG_NAME#v}")
          fi
          
          curl -v --fail-with-body -T $UPLOAD_FILE \
            -H "Authorization: Bearer $BIN_CHICKEN_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            -H "X-Bin-Chicken-Channel: $BIN_CHICKEN_CHANNEL" \
            -H "X-Bin-Chicken-Target: $BIN_CHICKEN_TARGET" \
            -H "X-Bin-Chicken-Original-Filename: $UPLOAD_FILE" \
            -H "X-Bin-Chicken-UUID: $(cat build_uuid.txt)" \
            -H "X-Bin-Chicken-Signature: $(cat $UPLOAD_FILE.minisig | base64 -w 0)" \
            "${BIN_CHICKEN_VERSION_HEADER[@]}" \
            https://binchicken.vicr123.com/api/repositories/$BIN_CHICKEN_REPOSITORY
  release-to-created-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ ubuntu-24.04, ubuntu-24.04-arm ]
    env:
      ARCH: "${{ endsWith(matrix.os, 'arm') && 'aarch64' || 'x86_64' }}"
    if: ${{ github.event_name == 'release' }}
    permissions:
      contents: write
    needs:
      - build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: contemporary-playground-linux-${{ env.ARCH }}
      - name: Upload Release
        run: |
          curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ github.token }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Content-Type: application/octet-stream" \
          "https://uploads.github.com/repos/${{ github.event.repository.owner.login }}/${{ github.event.repository.name }}/releases/${{ github.event.release.id }}/assets?name=Contemporary_Playground-${{ env.ARCH }}.AppImage" \
          --data-binary "@Contemporary_Playground-${{ env.ARCH }}.AppImage"